name: Daily events refresh

on:
  schedule:
    # 10:00 UTC ≈ 6:00 AM ET (EDT) / 5:00 AM ET (EST). GitHub cron is UTC-only.
    - cron: '0 10 * * *'
  workflow_dispatch: {}   # manual "Run workflow" button for testing

permissions:
  contents: write

concurrency:
  group: daily-events
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerate EVENTS_DATA
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/refresh-events.mjs
      - name: Commit and push if changed
        run: |
          if git diff --quiet -- index.html; then
            echo "No changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Daily events refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
